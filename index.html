<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Optometria Kvíz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
–bg: #0d1117;
–surface: #161b22;
–surface2: #1c2333;
–border: #30363d;
–accent: #58a6ff;
–accent2: #3fb950;
–warn: #f85149;
–gold: #e3b341;
–text: #e6edf3;
–muted: #7d8590;
–radius: 14px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 0;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 480px; min-height: 100vh; padding: 24px 16px 40px; flex-direction: column; }
.screen.active { display: flex; }

/* ── HOME ── */
#home { align-items: center; justify-content: center; gap: 0; }
.logo-area { text-align: center; margin-bottom: 40px; }
.eye-icon { font-size: 56px; display: block; margin-bottom: 12px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.logo-area h1 { font-family: ‘DM Serif Display’, serif; font-size: 32px; color: var(–text); letter-spacing: -0.5px; }
.logo-area p { color: var(–muted); font-size: 14px; margin-top: 6px; font-weight: 300; }

.section-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(–muted); margin-bottom: 12px; }

.count-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 28px; }
.count-btn {
background: var(–surface);
border: 2px solid var(–border);
color: var(–text);
border-radius: var(–radius);
padding: 18px 12px;
font-family: ‘DM Serif Display’, serif;
font-size: 28px;
cursor: pointer;
transition: all 0.2s;
display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.count-btn span { font-family: ‘DM Sans’, sans-serif; font-size: 11px; color: var(–muted); font-weight: 400; }
.count-btn:hover, .count-btn.selected { border-color: var(–accent); background: rgba(88,166,255,0.08); }
.count-btn.selected { color: var(–accent); }

.start-btn {
width: 100%;
background: var(–accent);
color: #0d1117;
border: none;
border-radius: var(–radius);
padding: 18px;
font-size: 16px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.3px;
}
.start-btn:hover { background: #79beff; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── QUIZ ── */
#quiz { gap: 0; }

.quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.quit-btn { background: none; border: none; color: var(–muted); font-size: 20px; cursor: pointer; padding: 4px; }
.progress-wrap { flex: 1; }
.progress-bar-bg { height: 6px; background: var(–border); border-radius: 99px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(–accent), #a371f7); border-radius: 99px; transition: width 0.4s ease; }
.progress-text { font-size: 12px; color: var(–muted); margin-top: 5px; text-align: right; }
.score-chip { background: var(–surface2); border: 1px solid var(–border); border-radius: 99px; padding: 4px 12px; font-size: 13px; color: var(–gold); font-weight: 600; white-space: nowrap; }

.question-card { background: var(–surface); border: 1px solid var(–border); border-radius: 18px; padding: 20px 18px; margin-bottom: 16px; flex: 1; display: flex; flex-direction: column; }
.question-type-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 99px; margin-bottom: 14px; }
.badge-single { background: rgba(88,166,255,0.15); color: var(–accent); }
.badge-multi { background: rgba(163,113,247,0.15); color: #a371f7; }
.badge-truefalse { background: rgba(63,185,80,0.15); color: var(–accent2); }
.badge-analysis { background: rgba(227,179,65,0.15); color: var(–gold); }

.question-num { font-size: 11px; color: var(–muted); margin-bottom: 8px; }
.question-text { font-size: 16px; line-height: 1.55; color: var(–text); font-weight: 400; flex: 1; }

/* ── OPTIONS ── */
.options-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.option-btn {
background: var(–surface2);
border: 2px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
text-align: left;
cursor: pointer;
transition: all 0.18s;
display: flex; align-items: center; gap: 12px;
line-height: 1.4;
}
.option-btn .opt-marker { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(–border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; transition: all 0.18s; }
.option-btn.checkbox .opt-marker { border-radius: 6px; }
.option-btn:hover:not(:disabled) { border-color: var(–accent); background: rgba(88,166,255,0.06); }
.option-btn.selected { border-color: var(–accent); background: rgba(88,166,255,0.1); }
.option-btn.selected .opt-marker { background: var(–accent); border-color: var(–accent); color: #0d1117; }
.option-btn.correct { border-color: var(–accent2) !important; background: rgba(63,185,80,0.1) !important; }
.option-btn.correct .opt-marker { background: var(–accent2) !important; border-color: var(–accent2) !important; color: #0d1117 !important; }
.option-btn.wrong { border-color: var(–warn) !important; background: rgba(248,81,73,0.08) !important; }
.option-btn.wrong .opt-marker { background: var(–warn) !important; border-color: var(–warn) !important; color: #fff !important; }
.option-btn:disabled { cursor: default; }

/* ── TRUE/FALSE per statement ── */
.tf-statement { background: var(–surface2); border: 2px solid var(–border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.tf-statement p { font-size: 14px; line-height: 1.45; margin-bottom: 10px; color: var(–text); }
.tf-btns { display: flex; gap: 8px; }
.tf-btn {
flex: 1; padding: 9px; border: 2px solid var(–border); border-radius: 8px;
background: var(–surface); color: var(–muted); font-family: ‘DM Sans’, sans-serif;
font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s;
}
.tf-btn:hover:not(:disabled) { border-color: var(–accent); color: var(–text); }
.tf-btn.selected-true { border-color: var(–accent2); background: rgba(63,185,80,0.12); color: var(–accent2); }
.tf-btn.selected-false { border-color: #f85149; background: rgba(248,81,73,0.08); color: #f85149; }
.tf-btn.correct-true { border-color: var(–accent2) !important; background: rgba(63,185,80,0.2) !important; color: var(–accent2) !important; }
.tf-btn.correct-false { border-color: var(–accent2) !important; background: rgba(63,185,80,0.2) !important; color: var(–accent2) !important; }
.tf-btn.wrong-answer { border-color: var(–warn) !important; background: rgba(248,81,73,0.15) !important; color: var(–warn) !important; }
.tf-btn:disabled { cursor: default; }

/* ── ANALYSIS (A/B/C/D/E) ── */
.analysis-statements { margin-bottom: 14px; }
.analysis-stmt { background: var(–surface2); border-left: 3px solid var(–border); padding: 10px 14px; border-radius: 0 8px 8px 0; margin-bottom: 8px; font-size: 14px; line-height: 1.45; color: var(–text); }
.analysis-stmt.first { border-left-color: var(–accent); }
.analysis-stmt.second { border-left-color: #a371f7; }
.analysis-grid { display: flex; flex-direction: column; gap: 8px; }
.analysis-option {
display: flex; align-items: flex-start; gap: 12px;
background: var(–surface2); border: 2px solid var(–border); border-radius: 12px;
padding: 12px 14px; cursor: pointer; transition: all 0.18s; font-family: ‘DM Sans’, sans-serif;
}
.analysis-option .opt-key { font-size: 15px; font-weight: 700; color: var(–gold); flex-shrink: 0; width: 20px; }
.analysis-option .opt-desc { font-size: 13px; color: var(–muted); line-height: 1.4; }
.analysis-option:hover:not(:disabled) { border-color: var(–gold); background: rgba(227,179,65,0.06); }
.analysis-option.selected { border-color: var(–gold); background: rgba(227,179,65,0.1); }
.analysis-option.correct { border-color: var(–accent2) !important; background: rgba(63,185,80,0.1) !important; }
.analysis-option.correct .opt-key { color: var(–accent2) !important; }
.analysis-option.wrong { border-color: var(–warn) !important; background: rgba(248,81,73,0.08) !important; }
.analysis-option.wrong .opt-key { color: var(–warn) !important; }
.analysis-option:disabled { cursor: default; }

/* ── FEEDBACK ── */
.feedback-bar { border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; font-size: 14px; font-weight: 500; display: none; align-items: center; gap: 10px; }
.feedback-bar.show { display: flex; }
.feedback-bar.correct-fb { background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3); color: var(–accent2); }
.feedback-bar.wrong-fb { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.25); color: var(–warn); }
.feedback-bar .fb-icon { font-size: 20px; flex-shrink: 0; }

/* ── NEXT BTN ── */
.action-wrap { margin-top: auto; padding-top: 8px; }
.next-btn {
width: 100%; background: var(–surface2); border: 2px solid var(–border);
color: var(–text); border-radius: var(–radius); padding: 16px;
font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
font-family: ‘DM Sans’, sans-serif;
}
.next-btn:hover:not(:disabled) { border-color: var(–accent); }
.next-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.next-btn.ready { border-color: var(–accent); color: var(–accent); background: rgba(88,166,255,0.08); }

/* ── RESULTS ── */
#results { align-items: center; justify-content: center; gap: 0; text-align: center; }
.result-ring { position: relative; width: 160px; height: 160px; margin: 0 auto 28px; }
.result-ring svg { transform: rotate(-90deg); }
.result-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.result-pct { font-family: ‘DM Serif Display’, serif; font-size: 42px; color: var(–text); }
.result-pct-label { font-size: 12px; color: var(–muted); }
#results h2 { font-family: ‘DM Serif Display’, serif; font-size: 26px; margin-bottom: 8px; }
#results .result-sub { color: var(–muted); font-size: 14px; margin-bottom: 32px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 32px; }
.stat-box { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; padding: 16px 10px; }
.stat-box .stat-val { font-family: ‘DM Serif Display’, serif; font-size: 26px; }
.stat-box .stat-lbl { font-size: 11px; color: var(–muted); margin-top: 2px; }
.stat-box.green .stat-val { color: var(–accent2); }
.stat-box.red .stat-val { color: var(–warn); }
.stat-box.blue .stat-val { color: var(–accent); }
.restart-btn {
width: 100%; background: var(–accent); color: #0d1117;
border: none; border-radius: var(–radius); padding: 18px;
font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
font-family: ‘DM Sans’, sans-serif; margin-bottom: 12px;
}
.restart-btn:hover { background: #79beff; }
.home-btn {
width: 100%; background: none; border: 2px solid var(–border);
color: var(–muted); border-radius: var(–radius); padding: 16px;
font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s;
font-family: ‘DM Sans’, sans-serif;
}
.home-btn:hover { border-color: var(–text); color: var(–text); }

.medal { font-size: 52px; margin-bottom: 12px; display: block; animation: bounceIn 0.5s ease; }
@keyframes bounceIn { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
</style>

</head>
<body>

<!-- HOME -->

<div id="home" class="screen active">
  <div class="logo-area">
    <span class="eye-icon">👁</span>
    <h1>Optometria Kvíz</h1>
    <p>Záróvizsga felkészítő tesztkérdések</p>
  </div>
  <div class="section-label">Kérdések száma</div>
  <div class="count-grid">
    <button class="count-btn" onclick="selectCount(30)">30<span>kérdés</span></button>
    <button class="count-btn" onclick="selectCount(100)">100<span>kérdés</span></button>
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>Kezdés →</button>
</div>

<!-- QUIZ -->

<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="quit-btn" onclick="goHome()" title="Kilépés">✕</button>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="score-chip" id="scoreChip">0 pt</div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-type-badge" id="typeBadge"></div>
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
  </div>

  <div id="answersArea"></div>
  <div class="feedback-bar" id="feedbackBar"><span class="fb-icon" id="fbIcon"></span><span id="fbMsg"></span></div>

  <div class="action-wrap">
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Válassz egy választ</button>
  </div>
</div>

<!-- RESULTS -->

<div id="results" class="screen">
  <span class="medal" id="medal"></span>
  <div class="result-ring">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="68" fill="none" stroke="#30363d" stroke-width="12"/>
      <circle cx="80" cy="80" r="68" fill="none" stroke="url(#grad)" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="427" id="resultCircle" stroke-dashoffset="427"/>
      <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#58a6ff"/>
        <stop offset="100%" stop-color="#3fb950"/>
      </linearGradient></defs>
    </svg>
    <div class="result-ring-text"><div class="result-pct" id="resultPct">0%</div><div class="result-pct-label">helyes</div></div>
  </div>
  <h2 id="resultTitle"></h2>
  <p class="result-sub" id="resultSub"></p>
  <div class="stats-grid">
    <div class="stat-box green"><div class="stat-val" id="statCorrect">0</div><div class="stat-lbl">helyes</div></div>
    <div class="stat-box red"><div class="stat-val" id="statWrong">0</div><div class="stat-lbl">hibás</div></div>
    <div class="stat-box blue"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">kérdés</div></div>
  </div>
  <button class="restart-btn" onclick="restartQuiz()">Újra játszás</button>
  <button class="home-btn" onclick="goHome()">← Főmenü</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUESTION DATA
// ═══════════════════════════════════════════════════════════════
// Types:
//  'single'    - one correct answer from options
//  'multi'     - multiple correct answers (checkboxes)
//  'truefalse' - each sub-statement is I (igaz/true) or H (hamis/false)
//  'analysis'  - A/B/C/D/E based on truth and relation of two statements

const QUESTIONS = [
// ── SINGLE CHOICE (1–363) ──
{id:1,type:'single',q:'Az orvostechnikai eszközöknél csak a bekövetkezett baleseteket kell jelenteni a hatóságnak?',opts:['Igen.','Nem, azt is jelenteni kell, ha bekövetkezhetett volna.','Ez csak a kórházra tartozik.'],ans:1},
{id:2,type:'single',q:'Egy orvostechnikai eszköz hibás működése, kalibrálatlansága, pontatlansága veszélyes helyzetnek tekinthető-e?',opts:['Nem.','Igen.','Ezt az alkalmazó mérlegeli.'],ans:1},
{id:3,type:'single',q:'Használható-e az orvostechnikai eszköz a használati útmutatótól eltérően?',opts:['Igen.','Nem.','Ez a felhasználó szakmai mérlegelési joga.'],ans:1},
{id:4,type:'single',q:'Ki dönti el, mire használható egy orvostechnikai eszköz?',opts:['A szakorvos.','A hatóság.','A gyártó.'],ans:2},
{id:5,type:'single',q:'Kinek kell jelenteni az orvostechnikai eszközzel bekövetkezett balesetet vagy ha bekövetkezhetett volna?',opts:['Nem kell jelenteni, de a minőségügyi rendszert felül kell vizsgálni.','A hatóságnak a jogszabályban előírt nyomtatványon.','A helyi munkavédelmi felelősnek, ha van.'],ans:1},
{id:6,type:'single',q:'Kötelező-e a magyar nyelvű használati útmutató orvostechnikai eszközhöz?',opts:['Igen.','Nem.','Igen, ha kéri a felhasználó.'],ans:0},
{id:7,type:'single',q:'Kötelező-e az orvostechnikai eszköz hatékonyságát bizonyítani?',opts:['Nem.','Igen.','Ezt az alkalmazó mérlegeli.'],ans:1},
{id:8,type:'single',q:'Kötelezőek-e az EU orvostechnikai eszköz szabályai Magyarországon?',opts:['Nem, csak ajánlás.','A felhasználó mérlegeli.','Igen.'],ans:2},
{id:9,type:'single',q:'Milyen módszerre kell visszavezethetőnek lennie a hatékonyság bizonyításának?',opts:['Irodalomkutatás.','Dokumentált klinikai kísérlet.','Egyedi próbák.'],ans:1},
{id:10,type:'single',q:'Mit jelent a CE jelölés az orvostechnikai eszközön?',opts:['Minőségügyi jel.','Megfelelés az uniós direktívának.','A centrális elektromos kiegyenlítés jele.'],ans:1},
{id:11,type:'single',q:'Hány féle orvostechnikai eszköz időszakos felülvizsgálatát írja elő miniszteri rendelet?',opts:['Egyet sem, ez a kórház döntésén múlik.','21.','Mindegyikét.'],ans:1},
{id:12,type:'single',q:'Mekkora pontatlanság terheli általában orvostechnikai eszközöket?',opts:['1%.','5%.','20%.'],ans:1},
{id:13,type:'single',q:'Mi a következménye a felülvizsgálat elmaradásának?',opts:['Az eszköz használatának felfüggesztése.','Pénzbüntetés.','Munkaügyi elmarasztalás.'],ans:0},
{id:14,type:'single',q:'Min múlik leginkább a mérések pontossága?',opts:['A műszer saját pontatlanságán.','A használó ismeretein.','A gyártás minőségügyi rendszerén.'],ans:1},
{id:15,type:'single',q:'Mit jelent a piros színű jelzés aktiválódása az orvostechnikai eszközökön?',opts:['A készülék üzemen kívül van.','A készülék veszélyhelyzetet érzékelt.','A készülék veszélyes feszültséggel üzemel.'],ans:1},
{id:16,type:'single',q:'Mit jelent a sárga színű jelzés aktiválódása az orvostechnikai eszközökön?',opts:['A készülék üzemen kívül van.','A készülék figyelmeztet.','A készülék valamely üzemmódja bekapcsolásának visszajelzése.'],ans:1},
{id:21,type:'single',q:'Mit jelent a farmakodinámia kifejezés?',opts:['gyógyszer alkalmazás','gyógyszer mellékhatás','gyógyszer hatás a szervezetre','gyógyszerek ellenjavallat'],ans:2},
{id:22,type:'single',q:'Az alábbiak közül melyik ér vesz részt az agy vérellátásában?',opts:['arteria carotis externa','arteria vertebralis','arteria iliaca externa','truncus coeliacus'],ans:1},
{id:23,type:'single',q:'Hogyan nevezzük az os temporale sziklacsonti részét?',opts:['pars squamosa','pars petrosa','pars tympanica','pars descendens'],ans:1},
{id:24,type:'single',q:'Melyik agyideg lép át a canalis opticuson?',opts:['nervus oculomotorius','nervus ophthalmicus','nervus opticus','nervus hypoglossus'],ans:2},
{id:25,type:'single',q:'Mennyi az erythrocyták száma mikroliterenként?',opts:['4.5-5 millió','1-2 millió','3-4 millió','6.5-7 millió'],ans:0},
{id:26,type:'single',q:'A Lang teszttel mit vizsgálhatunk?',opts:['A szemmozgásokat vizsgáljuk','A közeli harmadfokú binokuláris látást, azaz a szterolátást vizsgáljuk ezzel','A színlátást vizsgáljuk','A bénulást tudjuk kimutatni'],ans:1},
{id:27,type:'single',q:'A távoli Maddox vizsgálathoz kell:',opts:['Szemtükör','Pupilla lámpa','Vörös zöld szemüveg','Maddox kereszt és Maddox cilinder'],ans:3},

// STATE
// ═══════════════════════════════════════════════════════════════
let selectedCount = null;
let queue = [];
let current = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

// Per-question state
let selectedSingle = null;
let selectedMulti = new Set();
let tfAnswers = {};
let selectedAnalysis = null;

const ANALYSIS_OPTS = [
  {k:'A', desc:'Mindkét állítás igaz, és van összefüggés közöttük'},
  {k:'B', desc:'Mindkét állítás igaz, de nincs összefüggés közöttük'},
  {k:'C', desc:'Az első igaz, a második hamis'},
  {k:'D', desc:'Az első hamis, a második igaz'},
  {k:'E', desc:'Mindkét állítás hamis'},
];

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('startBtn').disabled = false;
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz() {
  queue = shuffle(QUESTIONS).slice(0, selectedCount);
  current = 0; score = 0; correctCount = 0; wrongCount = 0;
  showScreen('quiz');
  renderQuestion();
}

function goHome() {
  showScreen('home');
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  selectedCount = null;
  document.getElementById('startBtn').disabled = true;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════════
function renderQuestion() {
  answered = false;
  selectedSingle = null;
  selectedMulti = new Set();
  tfAnswers = {};
  selectedAnalysis = null;

  const q = queue[current];
  const total = queue.length;

  // Header
  const pct = ((current)/total*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${current+1} / ${total}`;
  document.getElementById('scoreChip').textContent = `${score} pt`;

  // Question card
  const badges = {single:'badge-single',multi:'badge-multi',truefalse:'badge-truefalse',analysis:'badge-analysis'};
  const labels = {single:'Egy helyes válasz',multi:'Több helyes válasz',truefalse:'Igaz / Hamis',analysis:'Összefüggés elemzés'};
  document.getElementById('typeBadge').className = 'question-type-badge '+badges[q.type];
  document.getElementById('typeBadge').textContent = labels[q.type];
  document.getElementById('questionNum').textContent = `#${q.id}`;
  document.getElementById('questionText').textContent = q.q;

  // Feedback
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';

  // Next btn
  const nb = document.getElementById('nextBtn');
  nb.disabled = true;
  nb.className = 'next-btn';
  nb.textContent = current < total-1 ? 'Válassz egy választ' : 'Eredmény megtekintése';

  // Render answers
  const area = document.getElementById('answersArea');
  area.innerHTML = '';

  if (q.type === 'single') renderSingle(q, area);
  else if (q.type === 'multi') renderMulti(q, area);
  else if (q.type === 'truefalse') renderTrueFalse(q, area);
  else if (q.type === 'analysis') renderAnalysis(q, area);
}

function renderSingle(q, area) {
  const wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => {
      if (answered) return;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSingle = i;
      enableNext();
    };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
}

function renderMulti(q, area) {
  const instr = document.createElement('div');
  instr.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:8px;';
  instr.textContent = 'Jelöld meg az összes helyes választ!';
  area.appendChild(instr);
  const wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn checkbox';
    btn.innerHTML = `<span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => {
      if (answered) return;
      if (selectedMulti.has(i)) { selectedMulti.delete(i); btn.classList.remove('selected'); btn.querySelector('.opt-marker').textContent = String.fromCharCode(65+i); }
      else { selectedMulti.add(i); btn.classList.add('selected'); btn.querySelector('.opt-marker').textContent = '✓'; }
      selectedMulti.size > 0 ? enableNext() : disableNext();
    };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
}

function renderTrueFalse(q, area) {
  q.stmts.forEach((stmt, i) => {
    const card = document.createElement('div');
    card.className = 'tf-statement';
    card.innerHTML = `<p>${i+1}. ${stmt.t}</p><div class="tf-btns"><button class="tf-btn" onclick="selectTF(${i},'I',this)">I – Igaz</button><button class="tf-btn" onclick="selectTF(${i},'H',this)">H – Hamis</button></div>`;
    area.appendChild(card);
  });
}

window.selectTF = function(idx, val, btn) {
  if (answered) return;
  const card = btn.closest('.tf-statement');
  card.querySelectorAll('.tf-btn').forEach(b => { b.classList.remove('selected-true','selected-false'); });
  if (val === 'I') btn.classList.add('selected-true');
  else btn.classList.add('selected-false');
  tfAnswers[idx] = val;
  if (Object.keys(tfAnswers).length === queue[current].stmts.length) enableNext();
};

function renderAnalysis(q, area) {
  const stmtsDiv = document.createElement('div');
  stmtsDiv.className = 'analysis-statements';
  stmtsDiv.innerHTML = `<div class="analysis-stmt first">1️⃣ ${q.stmt1}</div><div class="analysis-stmt second">2️⃣ ${q.stmt2}</div>`;
  area.appendChild(stmtsDiv);
  const grid = document.createElement('div');
  grid.className = 'analysis-grid';
  ANALYSIS_OPTS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'analysis-option';
    btn.dataset.key = opt.k;
    btn.innerHTML = `<span class="opt-key">${opt.k}</span><span class="opt-desc">${opt.desc}</span>`;
    btn.onclick = () => {
      if (answered) return;
      document.querySelectorAll('.analysis-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAnalysis = opt.k;
      enableNext();
    };
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function enableNext() {
  const nb = document.getElementById('nextBtn');
  nb.disabled = false;
  nb.className = 'next-btn ready';
  nb.textContent = 'Válasz ellenőrzése →';
}
function disableNext() {
  const nb = document.getElementById('nextBtn');
  nb.disabled = true;
  nb.className = 'next-btn';
}

function nextQuestion() {
  if (!answered) { checkAnswer(); return; }
  current++;
  if (current >= queue.length) { showResults(); return; }
  renderQuestion();
}

function checkAnswer() {
  answered = true;
  const q = queue[current];
  let isCorrect = false;

  if (q.type === 'single') {
    isCorrect = selectedSingle === q.ans;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      else if (i === selectedSingle && !isCorrect) btn.classList.add('wrong');
    });
  } else if (q.type === 'multi') {
    const correctSet = new Set(q.ans);
    const userSet = selectedMulti;
    isCorrect = q.ans.every(a => userSet.has(a)) && userSet.size === q.ans.length;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (correctSet.has(i)) btn.classList.add('correct');
      else if (userSet.has(i)) btn.classList.add('wrong');
    });
  } else if (q.type === 'truefalse') {
    let allRight = true;
    q.stmts.forEach((stmt, i) => {
      const userAns = tfAnswers[i];
      const card = document.querySelectorAll('.tf-statement')[i];
      const btns = card.querySelectorAll('.tf-btn');
      btns.forEach(b => b.disabled = true);
      const isI = stmt.ans === 'I';
      const trueBtn = btns[0], falseBtn = btns[1];
      if (stmt.ans === 'I') { trueBtn.classList.add('correct-true'); } else { falseBtn.classList.add('correct-false'); }
      if (userAns !== stmt.ans) {
        allRight = false;
        if (userAns === 'I') trueBtn.classList.add('wrong-answer');
        else falseBtn.classList.add('wrong-answer');
      }
    });
    isCorrect = allRight;
  } else if (q.type === 'analysis') {
    isCorrect = selectedAnalysis === q.ans;
    document.querySelectorAll('.analysis-option').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.key === q.ans) btn.classList.add('correct');
      else if (btn.dataset.key === selectedAnalysis && !isCorrect) btn.classList.add('wrong');
    });
  }

  // Feedback
  const fb = document.getElementById('feedbackBar');
  const fbIcon = document.getElementById('fbIcon');
  const fbMsg = document.getElementById('fbMsg');
  if (isCorrect) {
    score += 10;
    correctCount++;
    fb.className = 'feedback-bar correct-fb show';
    fbIcon.textContent = '✅';
    fbMsg.textContent = 'Helyes! +10 pont';
  } else {
    wrongCount++;
    fb.className = 'feedback-bar wrong-fb show';
    fbIcon.textContent = '❌';
    if (q.type === 'single') fbMsg.textContent = `Helytelen. Helyes: ${q.opts[q.ans]}`;
    else if (q.type === 'multi') fbMsg.textContent = `Helytelen. Helyes: ${q.ans.map(a=>String.fromCharCode(65+a)).join(', ')}`;
    else if (q.type === 'truefalse') fbMsg.textContent = 'Helytelen. A helyes válaszok zöldek.';
    else fbMsg.textContent = `Helytelen. Helyes: ${q.ans}`;
  }

  document.getElementById('scoreChip').textContent = `${score} pt`;

  const nb = document.getElementById('nextBtn');
  nb.disabled = false;
  nb.className = 'next-btn ready';
  nb.textContent = current < queue.length-1 ? 'Következő →' : 'Eredmény →';
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
function showResults() {
  showScreen('results');
  const total = queue.length;
  const pct = Math.round(correctCount/total*100);

  document.getElementById('resultPct').textContent = pct+'%';
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statTotal').textContent = total;

  // Ring animation
  const circumference = 2 * Math.PI * 68;
  const offset = circumference * (1 - pct/100);
  setTimeout(() => {
    document.getElementById('resultCircle').style.strokeDashoffset = offset;
    document.getElementById('resultCircle').style.transition = 'stroke-dashoffset 1s ease';
  }, 100);

  // Medal & title
  let medal, title, sub;
  if (pct >= 90) { medal='🏆'; title='Kiváló!'; sub='Mesteri teljesítmény!'; }
  else if (pct >= 75) { medal='🥇'; title='Nagyon jó!'; sub='Gratulálunk!'; }
  else if (pct >= 60) { medal='🥈'; title='Jó teljesítmény'; sub='Még egy kis gyakorlás!'; }
  else if (pct >= 40) { medal='🥉'; title='Haladás!'; sub='Érdemes újra próbálni.'; }
  else { medal='📚'; title='Tanulj tovább!'; sub='Olvasd át az anyagot.'; }

  document.getElementById('medal').textContent = medal;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `${sub} Pontszám: ${score} | Helyes: ${correctCount}/${total}`;
}

function restartQuiz() {
  queue = shuffle(QUESTIONS).slice(0, selectedCount);
  current = 0; score = 0; correctCount = 0; wrongCount = 0;
  showScreen('quiz');
  renderQuestion();
}
</script>
