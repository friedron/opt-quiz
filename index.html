<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Optometria Kvíz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');

/* ── TOKENS ── */
:root {
/* ── DARK (default) ── */
–bg:        #080B12;
–card:      #0F1520;
–card2:     #151D2E;
–line:      #1E2A40;
–line2:     #263347;
–blue:      #4F8EF7;
–blue-dim:  rgba(79,142,247,0.18);
–blue-sel:  rgba(79,142,247,0.28);
–green:     #34C97A;
–green-dim: rgba(52,201,122,0.18);
–red:       #F25757;
–red-dim:   rgba(242,87,87,0.15);
–gold:      #F0C040;
–gold-dim:  rgba(240,192,64,0.18);
–gold-sel:  rgba(240,192,64,0.30);
–purple:    #A78BFA;
–text:      #EDF2FF;
–text2:     #8899BB;
–text3:     #4A5A7A;
–r-sm:      10px;
–r-md:      16px;
–r-lg:      20px;
–r-xl:      28px;
}

@media (prefers-color-scheme: light) {
:root {
–bg:        #F0F4FF;
–card:      #FFFFFF;
–card2:     #EEF2FF;
–line:      #C8D4EE;
–line2:     #A8B8D8;
–blue:      #2563EB;
–blue-dim:  rgba(37,99,235,0.12);
–blue-sel:  rgba(37,99,235,0.20);
–green:     #16A34A;
–green-dim: rgba(22,163,74,0.13);
–red:       #DC2626;
–red-dim:   rgba(220,38,38,0.10);
–gold:      #B45309;
–gold-dim:  rgba(180,83,9,0.12);
–gold-sel:  rgba(180,83,9,0.20);
–purple:    #7C3AED;
–text:      #0F172A;
–text2:     #475569;
–text3:     #94A3B8;
}
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
font-family: ‘Inter’, system-ui, sans-serif;
background: var(–bg);
color: var(–text);
overscroll-behavior: none;
}

/* ── SCREENS ── */
.screen {
display: none;
width: 100%;
max-width: 430px;
min-height: 100dvh;
margin: 0 auto;
flex-direction: column;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════════
HOME SCREEN
══════════════════════════════════════════ */
#home {
padding: 0;
justify-content: flex-end;
}

.home-hero {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 48px 24px 32px;
position: relative;
overflow: hidden;
}

/* Background glow orbs */
.home-hero::before {
content: ‘’;
position: absolute;
width: 280px; height: 280px;
background: radial-gradient(circle, rgba(79,142,247,0.22) 0%, transparent 70%);
top: 20px; left: 50%; transform: translateX(-50%);
pointer-events: none;
}

.home-logo {
width: 72px; height: 72px;
background: linear-gradient(135deg, var(–card2), var(–card));
border: 1px solid var(–line2);
border-radius: 22px;
display: flex; align-items: center; justify-content: center;
font-size: 32px;
margin-bottom: 24px;
box-shadow: 0 8px 32px rgba(79,142,247,0.15);
animation: floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo {
0%,100% { transform: translateY(0); }
50%      { transform: translateY(-6px); }
}

.home-title {
font-family: ‘Syne’, sans-serif;
font-size: 28px;
font-weight: 800;
letter-spacing: -0.5px;
color: var(–text);
margin-bottom: 6px;
text-align: center;
}

.home-sub {
font-size: 13px;
color: var(–text2);
font-weight: 400;
text-align: center;
line-height: 1.5;
}

.home-badge-row {
display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; justify-content: center;
}
.home-badge {
background: var(–card);
border: 1px solid var(–line);
border-radius: 99px;
padding: 5px 12px;
font-size: 11px;
color: var(–text2);
font-weight: 500;
}

/* Bottom sheet style */
.home-sheet {
background: var(–card);
border-top: 1px solid var(–line);
border-radius: var(–r-xl) var(–r-xl) 0 0;
padding: 28px 20px 40px;
}

.sheet-label {
font-size: 10px;
font-weight: 600;
letter-spacing: 1.8px;
text-transform: uppercase;
color: var(–text3);
margin-bottom: 14px;
}

/* Mode cards */
.mode-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.mode-card {
background: var(–bg);
border: 1.5px solid var(–line);
border-radius: var(–r-md);
padding: 16px;
cursor: pointer;
transition: border-color 0.18s, background 0.18s, transform 0.12s;
display: flex; align-items: center; gap: 14px;
text-align: left;
width: 100%;
position: relative;
overflow: hidden;
}
.mode-card:active { transform: scale(0.985); }

.mode-card.sel-blue  { border-color: var(–blue);   background: var(–blue-sel);  box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
.mode-card.sel-green { border-color: var(–green);  background: var(–green-dim); box-shadow: 0 0 0 3px rgba(52,201,122,0.15); }
.mode-card.sel-gold  { border-color: var(–gold);   background: var(–gold-sel);  box-shadow: 0 0 0 3px rgba(240,192,64,0.15); }

.mode-icon {
width: 44px; height: 44px; border-radius: 12px;
display: flex; align-items: center; justify-content: center;
font-size: 20px; flex-shrink: 0;
}
.mode-icon.blue   { background: var(–blue-dim); }
.mode-icon.green  { background: var(–green-dim); }
.mode-icon.gold   { background: var(–gold-dim); }

.mode-info { flex: 1; }
.mode-name {
font-family: ‘Syne’, sans-serif;
font-size: 15px; font-weight: 700;
color: var(–text); margin-bottom: 2px;
}
.mode-card.sel-blue  .mode-name { color: var(–blue); }
.mode-card.sel-green .mode-name { color: var(–green); }
.mode-card.sel-gold  .mode-name { color: var(–gold); }
.mode-desc { font-size: 12px; color: var(–text2); line-height: 1.4; }

.mode-check {
width: 20px; height: 20px; border-radius: 50%;
border: 1.5px solid var(–line2);
flex-shrink: 0; transition: all 0.18s;
display: flex; align-items: center; justify-content: center;
}
.mode-card.sel-blue  .mode-check { background: var(–blue);  border-color: var(–blue);  color: #fff; width: 24px; height: 24px; }
.mode-card.sel-blue  .mode-check::after { content: ‘✓’; font-size: 13px; font-weight: 800; }
.mode-card.sel-green .mode-check { background: var(–green); border-color: var(–green); color: #fff; width: 24px; height: 24px; }
.mode-card.sel-green .mode-check::after { content: ‘✓’; font-size: 13px; font-weight: 800; }
.mode-card.sel-gold  .mode-check { background: var(–gold);  border-color: var(–gold);  color: #000; width: 24px; height: 24px; }
.mode-card.sel-gold  .mode-check::after { content: ‘✓’; font-size: 13px; font-weight: 800; }

.start-btn {
width: 100%;
background: var(–line);
color: var(–text3);
font-weight: 700;
border: none;
border-radius: var(–r-md);
padding: 17px;
font-family: ‘Syne’, sans-serif;
font-size: 15px;
cursor: not-allowed;
transition: all 0.2s;
letter-spacing: 0.3px;
}
.start-btn:active:not(:disabled) { transform: scale(0.98); }
.start-btn.ready {
background: var(–blue);
color: #fff;
cursor: pointer;
box-shadow: 0 4px 18px rgba(37,99,235,0.40);
}
.start-btn.ready:hover { filter: brightness(1.1); }

/* ══════════════════════════════════════════
QUIZ SCREEN
══════════════════════════════════════════ */
#quiz {
padding: 0;
}

/* Top bar */
.quiz-topbar {
display: flex;
align-items: center;
gap: 12px;
padding: 16px 16px 12px;
position: sticky; top: 0;
background: var(–bg);
z-index: 10;
border-bottom: 1px solid var(–line);
backdrop-filter: blur(10px);
}

.quit-btn {
width: 36px; height: 36px;
background: var(–card);
border: 1.5px solid var(–line2);
border-radius: 10px;
color: var(–text2);
font-size: 14px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: all 0.15s;
font-weight: 700;
}
.quit-btn:hover { border-color: var(–red); color: var(–red); background: var(–red-dim); }

.topbar-center { flex: 1; }

.progress-track {
height: 4px;
background: var(–line);
border-radius: 99px;
overflow: hidden;
margin-bottom: 6px;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–blue), var(–purple));
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.progress-fill.gold-fill {
background: linear-gradient(90deg, var(–gold), #F97316);
}

.progress-meta {
display: flex; justify-content: space-between;
font-size: 11px; color: var(–text3); font-weight: 500;
}

.score-pill {
background: var(–gold-dim);
border: 1.5px solid var(–gold);
border-radius: 99px;
padding: 6px 12px;
font-size: 12px;
font-weight: 700;
color: var(–gold);
white-space: nowrap;
flex-shrink: 0;
}

/* Scroll area */
.quiz-scroll {
flex: 1;
overflow-y: auto;
padding: 16px 16px 0;
-webkit-overflow-scrolling: touch;
}

/* Question block */
.q-type-row {
display: flex; align-items: center; gap: 8px;
margin-bottom: 12px;
}
.q-type-pill {
font-size: 10px; font-weight: 600;
letter-spacing: 1px; text-transform: uppercase;
padding: 4px 10px; border-radius: 99px;
}
.pill-single   { background: var(–blue-dim);        color: var(–blue); }
.pill-multi    { background: rgba(167,139,250,0.12);  color: var(–purple); }
.pill-tf       { background: var(–green-dim);        color: var(–green); }
.pill-analysis { background: var(–gold-dim);         color: var(–gold); }

.q-num { font-size: 11px; color: var(–text3); font-weight: 500; }

.q-text {
font-size: 16px;
line-height: 1.6;
color: var(–text);
font-weight: 400;
margin-bottom: 20px;
}

/* Options */
.options-wrap { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }

.option-btn {
background: var(–card);
border: 1.5px solid var(–line);
border-radius: var(–r-md);
padding: 14px 16px;
color: var(–text);
font-family: ‘Inter’, sans-serif;
font-size: 14px;
text-align: left;
cursor: pointer;
transition: border-color 0.15s, background 0.15s, transform 0.1s;
display: flex; align-items: center; gap: 12px;
line-height: 1.45;
width: 100%;
}
.option-btn:active:not(:disabled) { transform: scale(0.99); }

.opt-marker {
width: 28px; height: 28px;
border-radius: 50%;
border: 1.5px solid var(–line2);
flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
font-size: 11px; font-weight: 700;
color: var(–text2);
transition: all 0.15s;
background: var(–card2);
}
.option-btn.checkbox .opt-marker { border-radius: 8px; }

.option-btn:hover:not(:disabled) { border-color: var(–blue); background: var(–blue-dim); }
.option-btn:hover:not(:disabled) .opt-marker { border-color: var(–blue); color: var(–blue); }

.option-btn.selected { border-color: var(–blue); background: var(–blue-sel); border-width: 2.5px; }
.option-btn.selected .opt-marker { background: var(–blue); border-color: var(–blue); color: #fff; font-weight: 800; }
.option-btn.selected { color: var(–text); }

.option-btn.correct { border-color: var(–green) !important; background: var(–green-dim) !important; }
.option-btn.correct .opt-marker { background: var(–green) !important; border-color: var(–green) !important; color: #fff !important; }

.option-btn.wrong { border-color: var(–red) !important; background: var(–red-dim) !important; }
.option-btn.wrong .opt-marker { background: var(–red) !important; border-color: var(–red) !important; color: #fff !important; }

.option-btn:disabled { cursor: default; }

/* Multi hint */
.multi-hint {
font-size: 11px; color: var(–text3); font-weight: 500;
margin-bottom: 10px;
display: flex; align-items: center; gap: 5px;
}

/* True/False */
.tf-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.tf-card {
background: var(–card);
border: 1.5px solid var(–line);
border-radius: var(–r-md);
overflow: hidden;
}

.tf-stmt {
font-size: 13.5px;
line-height: 1.5;
color: var(–text);
padding: 14px 14px 10px;
border-bottom: 1px solid var(–line);
}

.tf-row {
display: grid; grid-template-columns: 1fr 1fr;
}

.tf-btn {
padding: 11px 8px;
border: none;
background: transparent;
color: var(–text2);
font-family: ‘Inter’, sans-serif;
font-size: 13px; font-weight: 600;
cursor: pointer;
transition: background 0.15s, color 0.15s;
display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tf-btn:first-child { border-right: 1px solid var(–line); }
.tf-btn:hover:not(:disabled) { background: var(–card2); color: var(–text); }

.tf-btn.selected-true  { background: var(–green-dim); color: var(–green); border-top: 2px solid var(–green); font-weight: 700; }
.tf-btn.selected-false { background: var(–red-dim);   color: var(–red);   border-top: 2px solid var(–red);   font-weight: 700; }
.tf-btn.correct-true   { background: rgba(52,201,122,0.22) !important; color: var(–green) !important; }
.tf-btn.correct-false  { background: rgba(52,201,122,0.22) !important; color: var(–green) !important; }
.tf-btn.wrong-answer   { background: rgba(242,87,87,0.18) !important;  color: var(–red) !important; }
.tf-btn:disabled { cursor: default; }

/* Analysis */
.analysis-stmts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

.analysis-stmt {
background: var(–card);
border: 1.5px solid var(–line);
border-radius: var(–r-md);
padding: 13px 14px;
font-size: 13.5px;
line-height: 1.5;
color: var(–text);
display: flex; gap: 10px; align-items: flex-start;
}
.stmt-label {
width: 22px; height: 22px; border-radius: 50%;
font-size: 10px; font-weight: 700;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-top: 1px;
}
.stmt-label.s1 { background: var(–blue-dim); color: var(–blue); }
.stmt-label.s2 { background: rgba(167,139,250,0.15); color: var(–purple); }

.analysis-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

.analysis-option {
background: var(–card);
border: 1.5px solid var(–line);
border-radius: var(–r-md);
padding: 13px 14px;
cursor: pointer;
transition: border-color 0.15s, background 0.15s, transform 0.1s;
display: flex; align-items: center; gap: 12px;
font-family: ‘Inter’, sans-serif;
width: 100%;
}
.analysis-option:active:not(:disabled) { transform: scale(0.99); }

.opt-key {
width: 32px; height: 32px;
border-radius: 50%;
background: var(–card2);
border: 1.5px solid var(–line2);
display: flex; align-items: center; justify-content: center;
font-family: ‘Syne’, sans-serif;
font-size: 13px; font-weight: 700;
color: var(–gold);
flex-shrink: 0;
transition: all 0.15s;
}
.opt-desc { font-size: 13px; color: var(–text2); line-height: 1.4; text-align: left; }

.analysis-option:hover:not(:disabled) { border-color: var(–gold); background: var(–gold-dim); }
.analysis-option:hover:not(:disabled) .opt-key { border-color: var(–gold); }

.analysis-option.selected { border-color: var(–gold); background: var(–gold-sel); border-width: 2.5px; }
.analysis-option.selected .opt-key { background: var(–gold); border-color: var(–gold); color: #000; font-weight: 800; }

.analysis-option.correct { border-color: var(–green) !important; background: var(–green-dim) !important; }
.analysis-option.correct .opt-key { background: var(–green) !important; border-color: var(–green) !important; color: #fff !important; }

.analysis-option.wrong { border-color: var(–red) !important; background: var(–red-dim) !important; }
.analysis-option.wrong .opt-key { background: var(–red) !important; border-color: var(–red) !important; color: #fff !important; }
.analysis-option:disabled { cursor: default; }

/* Master bar */
.master-bar {
background: var(–gold-dim);
border: 1px solid rgba(240,192,64,0.2);
border-radius: var(–r-sm);
padding: 9px 14px;
font-size: 12px; color: var(–gold);
font-weight: 500;
margin-bottom: 12px;
display: none;
}
.master-bar.show { display: block; }

/* Bottom action area */
.quiz-bottom {
padding: 12px 16px;
background: var(–bg);
border-top: 1px solid var(–line);
position: sticky; bottom: 0;
}

/* Feedback */
.feedback-toast {
border-radius: var(–r-sm);
padding: 11px 14px;
margin-bottom: 10px;
font-size: 13px; font-weight: 500;
display: none; align-items: center; gap: 10px;
line-height: 1.4;
}
.feedback-toast.show { display: flex; }
.feedback-toast.correct-fb { background: var(–green-dim); border: 2px solid var(–green); color: var(–green); font-weight: 600; }
.feedback-toast.wrong-fb   { background: var(–red-dim);   border: 2px solid var(–red);   color: var(–red);   font-weight: 600; }
.fb-icon { font-size: 16px; flex-shrink: 0; }

/* Next button */
.next-btn {
width: 100%;
background: var(–line);
border: 1.5px solid var(–line2);
color: var(–text3);
border-radius: var(–r-md);
padding: 16px;
font-family: ‘Syne’, sans-serif;
font-size: 14px; font-weight: 700;
cursor: not-allowed;
transition: all 0.18s;
letter-spacing: 0.2px;
}
.next-btn:disabled { cursor: not-allowed; }
.next-btn.ready {
background: var(–blue);
border-color: var(–blue);
color: #fff;
cursor: pointer;
font-weight: 700;
box-shadow: 0 4px 18px rgba(37,99,235,0.40);
}
.next-btn.ready:active { transform: scale(0.98); }

/* ══════════════════════════════════════════
RESULTS SCREEN
══════════════════════════════════════════ */
#results {
padding: 0;
justify-content: flex-end;
}

.results-hero {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 48px 24px 24px;
position: relative;
overflow: hidden;
}

.results-hero::before {
content: ‘’;
position: absolute;
width: 300px; height: 300px;
background: radial-gradient(circle, rgba(79,142,247,0.20) 0%, transparent 65%);
top: 0; left: 50%; transform: translateX(-50%);
pointer-events: none;
}

.result-ring-wrap {
position: relative; width: 148px; height: 148px; margin-bottom: 24px;
}
.result-ring-wrap svg { transform: rotate(-90deg); }
.ring-center {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
}
.ring-pct {
font-family: ‘Syne’, sans-serif;
font-size: 36px; font-weight: 800;
color: var(–text); line-height: 1;
}
.ring-lbl { font-size: 11px; color: var(–text2); margin-top: 2px; }

.medal-emoji { font-size: 40px; margin-bottom: 12px; display: block; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { 0%{transform:scale(0) rotate(-10deg)} 100%{transform:scale(1) rotate(0)} }

.result-title {
font-family: ‘Syne’, sans-serif;
font-size: 24px; font-weight: 800;
color: var(–text); margin-bottom: 6px;
text-align: center;
}
.result-sub { font-size: 13px; color: var(–text2); text-align: center; line-height: 1.5; }

.results-sheet {
background: var(–card);
border-top: 1px solid var(–line);
border-radius: var(–r-xl) var(–r-xl) 0 0;
padding: 24px 20px 40px;
}

.stats-row {
display: grid; grid-template-columns: repeat(3, 1fr);
gap: 10px; margin-bottom: 20px;
}

.stat-card {
background: var(–bg);
border: 1px solid var(–line);
border-radius: var(–r-md);
padding: 16px 10px;
text-align: center;
}
.stat-val {
font-family: ‘Syne’, sans-serif;
font-size: 28px; font-weight: 800;
line-height: 1; margin-bottom: 4px;
}
.stat-val.green  { color: var(–green); }
.stat-val.red    { color: var(–red); }
.stat-val.blue   { color: var(–blue); }
.stat-lbl { font-size: 11px; color: var(–text2); font-weight: 500; }

.btn-primary {
width: 100%;
background: var(–blue);
color: #fff; border: none;
border-radius: var(–r-md);
padding: 17px;
font-family: ‘Syne’, sans-serif;
font-size: 15px; font-weight: 700;
cursor: pointer;
transition: opacity 0.15s, transform 0.12s;
margin-bottom: 10px;
}
.btn-primary:active { transform: scale(0.98); }

.btn-ghost {
width: 100%;
background: none;
border: 1.5px solid var(–line);
color: var(–text2);
border-radius: var(–r-md);
padding: 16px;
font-family: ‘Syne’, sans-serif;
font-size: 14px; font-weight: 600;
cursor: pointer;
transition: border-color 0.15s, color 0.15s;
}
.btn-ghost:hover { border-color: var(–line2); color: var(–text); }
</style>

</head>
<body>

<!-- ══ HOME ══ -->

<div id="home" class="screen active">
  <div class="home-hero">
    <div class="home-logo">👁</div>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let selectedCount = null;
let masterMode = false;
let queue = [];
let masterPool = [];       // questions not yet correctly answered
let masterSolved = 0;      // how many uniquely solved
let masterTotal = 0;       // total unique questions
let current = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

// Per-question state
let selectedSingle = null;
let selectedMulti = new Set();
let tfAnswers = {};
let selectedAnalysis = null;

const ANALYSIS_OPTS = [
  {k:'A', desc:'Mindkét állítás igaz, és van összefüggés közöttük'},
  {k:'B', desc:'Mindkét állítás igaz, de nincs összefüggés közöttük'},
  {k:'C', desc:'Az első igaz, a második hamis'},
  {k:'D', desc:'Az első hamis, a második igaz'},
  {k:'E', desc:'Mindkét állítás hamis'},
];

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function selectCount(n) {
  selectedCount = n;
  masterMode = false;
  document.querySelectorAll('.mode-card').forEach(b => b.className = 'mode-card');
  const colorMap = {30:'sel-blue', 100:'sel-green'};
  event.currentTarget.className = 'mode-card ' + (colorMap[n] || 'sel-blue');
  const sb = document.getElementById('startBtn');
  sb.className = 'start-btn ready';
}

function selectMaster() {
  masterMode = true;
  selectedCount = null;
  document.querySelectorAll('.mode-card').forEach(b => b.className = 'mode-card');
  document.getElementById('masterModeBtn').className = 'mode-card sel-gold';
  const sb = document.getElementById('startBtn');
    sb.className = 'start-btn ready';
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz() {
  if (!selectedCount && !masterMode) return;
  current = 0; score = 0; correctCount = 0; wrongCount = 0;
  if (masterMode) {
    masterPool = shuffle(QUESTIONS);
    masterTotal = masterPool.length;
    masterSolved = 0;
    queue = [masterPool[0]];
    current = 0;
  } else {
    queue = shuffle(QUESTIONS).slice(0, selectedCount);
  }
  showScreen('quiz');
  renderQuestion();
}

function goHome() {
  showScreen('home');
  document.querySelectorAll('.mode-card').forEach(b => b.className = 'mode-card');
  selectedCount = null;
  masterMode = false;
  const sb = document.getElementById('startBtn');
  sb.className = 'start-btn';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════════
function renderQuestion() {
  answered = false;
  selectedSingle = null;
  const qs = document.getElementById('quizScroll'); if(qs) qs.scrollTop = 0;
  selectedMulti = new Set();
  tfAnswers = {};
  selectedAnalysis = null;

  const q = queue[current];
  const total = queue.length;

  // Header
  const mb = document.getElementById('masterBar');
  if (masterMode) {
    const pct2 = Math.round(masterSolved/masterTotal*100);
    mb.className = 'master-bar show';
    mb.textContent = `♾️ Teljesítve: ${masterSolved} / ${masterTotal} kérdés (${pct2}%) — Visszamaradt: ${masterPool.length}`;
    document.getElementById('progressBar').style.width = (masterSolved/masterTotal*100)+'%'; document.getElementById('progressBar').className = 'progress-fill gold-fill';
    document.getElementById('progressText').textContent = `${masterSolved}/${masterTotal} teljesítve`; document.getElementById('progressRight').textContent = '';
  } else {
    mb.className = 'master-bar'; document.getElementById('progressBar').className = 'progress-fill';
    const pct = ((current)/total*100);
    document.getElementById('progressBar').style.width = pct+'%';
    document.getElementById('progressText').textContent = `${current+1} / ${total} kérdés`; document.getElementById('progressRight').textContent = '';
  }
  document.getElementById('scoreChip').textContent = `${score} pt`;

  // Question card
  const badges = {single:'q-type-pill pill-single',multi:'q-type-pill pill-multi',truefalse:'q-type-pill pill-tf',analysis:'q-type-pill pill-analysis'};
  const labels = {single:'Egy helyes válasz',multi:'Több helyes válasz',truefalse:'Igaz / Hamis',analysis:'Összefüggés elemzés'};
  document.getElementById('typeBadge').className = 'question-type-badge '+badges[q.type];
  document.getElementById('typeBadge').textContent = labels[q.type];
  document.getElementById('questionNum').textContent = `#${q.id}`;
  document.getElementById('questionText').textContent = q.q;

  // Feedback
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';

  // Next btn
  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  nb.textContent = 'Válassz egy választ';

  // Render answers
  const area = document.getElementById('answersArea');
  area.innerHTML = '';

  if (q.type === 'single') renderSingle(q, area);
  else if (q.type === 'multi') renderMulti(q, area);
  else if (q.type === 'truefalse') renderTrueFalse(q, area);
  else if (q.type === 'analysis') renderAnalysis(q, area);
}

function renderSingle(q, area) {
  const wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => {
      if (answered) return;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSingle = i;
      enableNext();
    };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
}

function renderMulti(q, area) {
  const instr = document.createElement('div');
  instr.className = 'multi-hint';
  instr.innerHTML = '☑ Jelöld meg az összes helyes választ!';
  area.appendChild(instr);
  const wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn checkbox';
    btn.innerHTML = `<span class="opt-marker">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => {
      if (answered) return;
      if (selectedMulti.has(i)) { selectedMulti.delete(i); btn.classList.remove('selected'); btn.querySelector('.opt-marker').textContent = String.fromCharCode(65+i); }
      else { selectedMulti.add(i); btn.classList.add('selected'); btn.querySelector('.opt-marker').textContent = '✓'; }
      selectedMulti.size > 0 ? enableNext() : disableNext();
    };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
}

function renderTrueFalse(q, area) {
  const list = document.createElement('div');
  list.className = 'tf-list';
  q.stmts.forEach((stmt, i) => {
    const card = document.createElement('div');
    card.className = 'tf-card';
    card.innerHTML = `<div class="tf-stmt">${i+1}. ${stmt.t}</div><div class="tf-row"><button class="tf-btn" onclick="selectTF(${i},'I',this)">✓ Igaz</button><button class="tf-btn" onclick="selectTF(${i},'H',this)">✗ Hamis</button></div>`;
    list.appendChild(card);
  });
  area.appendChild(list);
}

window.selectTF = function(idx, val, btn) {
  if (answered) return;
  const card = btn.closest('.tf-card');
  card.querySelectorAll('.tf-btn').forEach(b => { b.classList.remove('selected-true','selected-false'); });
  if (val === 'I') btn.classList.add('selected-true');
  else btn.classList.add('selected-false');
  tfAnswers[idx] = val;
  if (Object.keys(tfAnswers).length === queue[current].stmts.length) enableNext();
};

function renderAnalysis(q, area) {
  const stmtsDiv = document.createElement('div');
  stmtsDiv.className = 'analysis-stmts';
  stmtsDiv.innerHTML = `<div class="analysis-stmt"><span class="stmt-label s1">1</span><span>${q.stmt1}</span></div><div class="analysis-stmt"><span class="stmt-label s2">2</span><span>${q.stmt2}</span></div>`;
  area.appendChild(stmtsDiv);
  const grid = document.createElement('div');
  grid.className = 'analysis-opts';
  ANALYSIS_OPTS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'analysis-option';
    btn.dataset.key = opt.k;
    btn.innerHTML = `<span class="opt-key">${opt.k}</span><span class="opt-desc">${opt.desc}</span>`;
    btn.onclick = () => {
      if (answered) return;
      document.querySelectorAll('.analysis-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAnalysis = opt.k;
      enableNext();
    };
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function enableNext() {
  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn ready';
  nb.textContent = 'Válasz ellenőrzése →';
}
function disableNext() {
  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
}

function nextQuestion() {
  if (!document.getElementById('nextBtn').className.includes('ready')) return;
  if (!answered) { checkAnswer(); return; }
  if (masterMode) {
    // masterPool is updated in checkAnswer; if empty we're done
    if (masterPool.length === 0) { showResults(); return; }
    queue = [masterPool[0]];
    current = 0;
    renderQuestion();
  } else {
    current++;
    if (current >= queue.length) { showResults(); return; }
    renderQuestion();
  }
}

function checkAnswer() {
  answered = true;
  const q = queue[current];
  let isCorrect = false;

  if (q.type === 'single') {
    isCorrect = selectedSingle === q.ans;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      else if (i === selectedSingle && !isCorrect) btn.classList.add('wrong');
    });
  } else if (q.type === 'multi') {
    const correctSet = new Set(q.ans);
    const userSet = selectedMulti;
    isCorrect = q.ans.every(a => userSet.has(a)) && userSet.size === q.ans.length;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (correctSet.has(i)) btn.classList.add('correct');
      else if (userSet.has(i)) btn.classList.add('wrong');
    });
  } else if (q.type === 'truefalse') {
    let allRight = true;
    q.stmts.forEach((stmt, i) => {
      const userAns = tfAnswers[i];
      const card = document.querySelectorAll('.tf-card')[i];
      const btns = card.querySelectorAll('.tf-btn');
      btns.forEach(b => b.disabled = true);
      const isI = stmt.ans === 'I';
      const trueBtn = btns[0], falseBtn = btns[1];
      if (stmt.ans === 'I') { trueBtn.classList.add('correct-true'); } else { falseBtn.classList.add('correct-false'); }
      if (userAns !== stmt.ans) {
        allRight = false;
        if (userAns === 'I') trueBtn.classList.add('wrong-answer');
        else falseBtn.classList.add('wrong-answer');
      }
    });
    isCorrect = allRight;
  } else if (q.type === 'analysis') {
    isCorrect = selectedAnalysis === q.ans;
    document.querySelectorAll('.analysis-option').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.key === q.ans) btn.classList.add('correct');
      else if (btn.dataset.key === selectedAnalysis && !isCorrect) btn.classList.add('wrong');
    });
  }

  // Feedback
  const fb = document.getElementById('feedbackBar');
  const fbIcon = document.getElementById('fbIcon');
  const fbMsg = document.getElementById('fbMsg');
  if (isCorrect) {
    score += 10;
    correctCount++;
    fb.className = 'feedback-bar correct-fb show';
    fbIcon.textContent = '✅';
    if (masterMode) {
      // Remove this question from the pool (it was at index 0)
      masterPool.shift();
      masterSolved++;
      const remaining = masterPool.length;
      fbMsg.textContent = remaining === 0
        ? 'Helyes! 🏆 Minden kérdést teljesítettél!'
        : `Helyes! +10 pont — Még ${remaining} kérdés van hátra`;
    } else {
      fbMsg.textContent = 'Helyes! +10 pont';
    }
  } else {
    wrongCount++;
    fb.className = 'feedback-bar wrong-fb show';
    fbIcon.textContent = '❌';
    if (q.type === 'single') fbMsg.textContent = `Helytelen. Helyes: ${q.opts[q.ans]}`;
    else if (q.type === 'multi') fbMsg.textContent = `Helytelen. Helyes: ${q.ans.map(a=>String.fromCharCode(65+a)).join(', ')}`;
    else if (q.type === 'truefalse') fbMsg.textContent = 'Helytelen. A helyes válaszok zöldek.';
    else fbMsg.textContent = `Helytelen. Helyes: ${q.ans}`;
    if (masterMode) {
      // Move this question to a random position later in the pool (not first)
      masterPool.shift();
      const insertAt = masterPool.length === 0 ? 0 : Math.floor(Math.random() * Math.max(1, Math.min(masterPool.length, 5))) + 1;
      masterPool.splice(insertAt, 0, q);
    }
  }

  document.getElementById('scoreChip').textContent = `${score} pt`;

  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn ready';
  if (masterMode) {
    nb.textContent = masterPool.length === 0 ? 'Eredmény 🏆' : 'Következő →';
  } else {
    nb.textContent = current < queue.length-1 ? 'Következő →' : 'Eredmény →';
  }
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
function showResults() {
  showScreen('results');
  let total, pct;
  if (masterMode) {
    total = masterTotal;
    pct = 100; // completed all
  } else {
    total = queue.length;
    pct = Math.round(correctCount/total*100);
  }

  document.getElementById('resultPct').textContent = pct+'%';
  document.getElementById('statCorrect').textContent = masterMode ? masterTotal : correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statTotal').textContent = total;

  // Ring animation
  const circumference = 2 * Math.PI * 62;
  const offset = circumference * (1 - pct/100);
  setTimeout(() => {
    document.getElementById('resultCircle').style.strokeDashoffset = offset;
    document.getElementById('resultCircle').style.transition = 'stroke-dashoffset 1s ease';
  }, 100);

  // Medal & title
  let medal, title, sub;
  if (masterMode) {
    medal='♾️'; title='Végtelen Mód befejezve!'; sub=`Minden ${total} kérdést helyesen megválaszoltál!`;
  } else if (pct >= 90) { medal='🏆'; title='Kiváló!'; sub='Mesteri teljesítmény!'; }
  else if (pct >= 75) { medal='🥇'; title='Nagyon jó!'; sub='Gratulálunk!'; }
  else if (pct >= 60) { medal='🥈'; title='Jó teljesítmény'; sub='Még egy kis gyakorlás!'; }
  else if (pct >= 40) { medal='🥉'; title='Haladás!'; sub='Érdemes újra próbálni.'; }
  else { medal='📚'; title='Tanulj tovább!'; sub='Olvasd át az anyagot.'; }

  document.getElementById('medal').textContent = medal;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `${sub} Pontszám: ${score} | Kísérletek: ${correctCount+wrongCount}`;
}

function restartQuiz() {
  current = 0; score = 0; correctCount = 0; wrongCount = 0;
  if (masterMode) {
    masterPool = shuffle(QUESTIONS);
    masterTotal = masterPool.length;
    masterSolved = 0;
    queue = [masterPool[0]];
  } else {
    queue = shuffle(QUESTIONS).slice(0, selectedCount);
  }
  showScreen('quiz');
  renderQuestion();
}
</script>
