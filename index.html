<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Optometria Kvíz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-hero">
    <div class="logo-box">👁</div>
    <div class="home-h1">Optometria Kvíz</div>
    <div class="home-p">Záróvizsga felkészítő · 754 kérdés</div>
    <div class="badge-row">
      <span class="badge">Egy helyes</span>
      <span class="badge">Több helyes</span>
      <span class="badge">Igaz / Hamis</span>
      <span class="badge">Összefüggés</span>
    </div>
  </div>
  <div class="sheet">
    <div class="sheet-lbl">Válassz módot</div>
    <div class="modes">
      <button class="mode-card" id="btn30" onclick="selectCount(30)">
        <div class="mode-ico">⚡</div>
        <div class="mode-txt">
          <div class="mode-name">30 kérdés</div>
          <div class="mode-desc">Gyors gyakorlás · ~10 perc</div>
        </div>
        <div class="mode-check"></div>
      </button>
      <button class="mode-card" id="btn100" onclick="selectCount(100)">
        <div class="mode-ico">📋</div>
        <div class="mode-txt">
          <div class="mode-name">100 kérdés</div>
          <div class="mode-desc">Teljes felkészülés · ~35 perc</div>
        </div>
        <div class="mode-check"></div>
      </button>
      <button class="mode-card" id="masterModeBtn" onclick="selectMaster()">
        <div class="mode-ico">♾️</div>
        <div class="mode-txt">
          <div class="mode-name">Végtelen Mód</div>
          <div class="mode-desc">Minden kérdést helyesen — hibáknál visszakerül</div>
        </div>
        <div class="mode-check"></div>
      </button>
    </div>
    <button class="cta-btn" id="startBtn" onclick="startQuiz()">Kezdés</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="topbar">
    <button class="x-btn" onclick="goHome()">✕</button>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="progressBar"></div></div>
      <div class="prog-meta"><span id="progressText"></span><span id="progressRight"></span></div>
    </div>
    <div class="pts-pill" id="scoreChip">0 pt</div>
  </div>
  <div class="q-scroll" id="quizScroll">
    <div class="master-bar" id="masterBar"></div>
    <div class="type-row">
      <div class="type-pill" id="typeBadge"></div>
      <div class="q-num" id="questionNum"></div>
    </div>
    <div class="q-text" id="questionText"></div>
    <div id="answersArea"></div>
  </div>
  <div class="q-bottom">
    <div class="feedback" id="feedbackBar"><span class="fb-ico" id="fbIcon"></span><span id="fbMsg"></span></div>
    <button class="go-btn" id="nextBtn" onclick="nextQuestion()">Válassz egy választ</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="res-hero">
    <span class="medal" id="medal"></span>
    <div class="ring-wrap">
      <svg width="148" height="148" viewBox="0 0 148 148">
        <circle cx="74" cy="74" r="62" fill="none" stroke="#E2E8F0" stroke-width="10"/>
        <circle cx="74" cy="74" r="62" fill="none" stroke="url(#rg)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="390" id="resultCircle" stroke-dashoffset="390"/>
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#3B82F6"/>
          <stop offset="100%" stop-color="#22C55E"/>
        </linearGradient></defs>
      </svg>
      <div class="ring-mid"><div class="ring-pct" id="resultPct">0%</div><div class="ring-sub">helyes</div></div>
    </div>
    <div class="res-title" id="resultTitle"></div>
    <div class="res-sub" id="resultSub"></div>
  </div>
  <div class="res-sheet">
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-n g" id="statCorrect">0</div><div class="stat-l">helyes</div></div>
      <div class="stat-box"><div class="stat-n r" id="statWrong">0</div><div class="stat-l">hibás</div></div>
      <div class="stat-box"><div class="stat-n b" id="statTotal">0</div><div class="stat-l">kérdés</div></div>
    </div>
    <button class="btn-pri" onclick="restartQuiz()">Újra játszás</button>
    <button class="btn-sec" onclick="goHome()">← Főmenü</button>
  </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
